<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Probatorik — Dein Pr&uuml;fstein</title>
<meta name="description" content="Finde deine persönliche Substanz-Konfiguration. 7 Fragen, ein Ergebnis.">
<meta property="og:title" content="Probatorik — Dein Prüfstein">
<meta property="og:description" content="Finde deine persönliche Substanz-Konfiguration. 7 Fragen, ein Ergebnis.">

<style>
:root {
  --bg: #06090f;
  --surface: #0e1320;
  --card: #141d30;
  --border: #3e5080;
  --text: #f4f6ff;
  --text-muted: #c2cee8;
  --text-dim: #8098b8;
  --teal: #b8d0f8;
  --accent: #f0d068;
  --naehrend: #90c098;
  --parasitaer: #e08868;
  --warning: #e0c060;
  --btn-text: #0a0e1a;
  --selection: rgba(184,208,248,0.25);
}
:root.light {
  --bg: #e4e8f8;
  --surface: #ffffff;
  --card: #d8e0f4;
  --border: #8898cc;
  --text: #000000;
  --text-muted: #2c3450;
  --text-dim: #505c80;
  --teal: #2c4490;
  --accent: #c8a820;
  --naehrend: #2a8040;
  --parasitaer: #c04030;
  --warning: #a08010;
  --btn-text: #ffffff;
  --selection: rgba(44,68,144,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, 'Helvetica Neue', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 17px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  min-height: 100vh;
}
::selection { background: var(--selection); }

/* Layout */
.app { max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem; min-height: 100vh; }

/* Header */
.header {
  text-align: center;
  padding: 3rem 0 2rem;
}
.header h1 {
  font-size: clamp(2rem, 6vw, 3.5rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: 1rem;
}
.header p {
  color: var(--text-muted);
  font-size: 1rem;
  max-width: 480px;
  margin: 0 auto;
}

/* Progress */
.progress {
  display: flex;
  gap: 4px;
  margin: 2rem 0;
}
.progress-dot {
  flex: 1;
  height: 3px;
  border-radius: 2px;
  background: var(--border);
  transition: background 0.4s;
}
.progress-dot.done { background: var(--teal); }
.progress-dot.active { background: var(--accent); }

/* Steps */
.step {
  display: none;
  animation: fadeIn 0.5s ease;
}
.step.active { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.step-tag {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1rem;
}
.step-question {
  font-size: clamp(1.4rem, 4vw, 2rem);
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 0.8rem;
}
.step-desc {
  color: var(--text-muted);
  font-size: 0.95rem;
  margin-bottom: 2rem;
  line-height: 1.8;
}

/* Options */
.options { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 2rem; }
.option {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 1rem 1.2rem;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  font-family: inherit;
  font-size: 1rem;
  color: var(--text);
  display: flex;
  align-items: flex-start;
  gap: 0.8rem;
}
.option:hover { border-color: var(--teal); }
.option.selected { border-color: var(--teal); background: var(--selection); }
.option-radio {
  width: 20px; height: 20px; min-width: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.option.selected .option-radio { border-color: var(--teal); }
.option.selected .option-radio::after {
  content: '';
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--teal);
}
.option-text strong { display: block; margin-bottom: 0.2rem; }
.option-text small { color: var(--text-dim); font-size: 0.85rem; }
.options-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 0.8rem 0 0.2rem;
}
.options-label:first-child { padding-top: 0; }

/* Slider */
.slider-wrap { margin-bottom: 2rem; }
.slider-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-bottom: 0.5rem;
}
.slider-value {
  text-align: center;
  font-size: 2rem;
  font-weight: 800;
  color: var(--teal);
  margin-bottom: 0.5rem;
}
input[type="range"] {
  width: 100%;
  -webkit-appearance: none;
  height: 6px;
  border-radius: 3px;
  background: var(--border);
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--teal);
  cursor: pointer;
}

/* Hint box */
.hint {
  background: rgba(240,208,104,0.08);
  border: 1px solid rgba(240,208,104,0.15);
  border-radius: 10px;
  padding: 1rem 1.2rem;
  margin-bottom: 2rem;
  font-size: 0.9rem;
  color: var(--accent);
  line-height: 1.7;
}
.hint strong { display: block; margin-bottom: 0.3rem; }
:root.light .hint {
  color: #5a4500;
  background: rgba(160,120,0,0.08);
  border-color: rgba(160,120,0,0.22);
}

/* Buttons */
.btn-row { display: flex; gap: 0.8rem; margin-top: 1.5rem; }
.btn {
  flex: 1;
  padding: 0.9rem 1.5rem;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn:hover { border-color: var(--text-muted); color: var(--text); }
.btn-primary {
  background: var(--teal);
  border-color: var(--teal);
  color: var(--btn-text);
}
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

/* Result */
.result { display: none; }
.result.active { display: block; }
.result-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.5rem;
  margin-bottom: 1.2rem;
}
.result-section h3 {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 0.8rem;
}
.result-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.6rem 0;
  border-bottom: 1px solid var(--border);
}
.result-item:last-child { border-bottom: none; }
.result-name { font-weight: 600; }
.result-config { color: var(--text-dim); font-size: 0.85rem; text-align: right; }
.result-badge {
  display: inline-block;
  padding: 0.2em 0.7em;
  border-radius: 6px;
  font-size: 0.75rem;
  font-weight: 700;
}
.badge-open { background: color-mix(in srgb, var(--naehrend) 15%, transparent); color: var(--naehrend); }
.badge-regulate { background: color-mix(in srgb, var(--teal) 15%, transparent); color: var(--teal); }
.badge-caution { background: color-mix(in srgb, var(--warning) 15%, transparent); color: var(--warning); }
.badge-avoid { background: color-mix(in srgb, var(--parasitaer) 15%, transparent); color: var(--parasitaer); }

.result-warning {
  background: color-mix(in srgb, var(--parasitaer) 8%, transparent);
  border: 1px solid color-mix(in srgb, var(--parasitaer) 20%, transparent);
  border-radius: 10px;
  padding: 1rem 1.2rem;
  margin-top: 1.5rem;
  font-size: 0.9rem;
  color: var(--parasitaer);
  line-height: 1.7;
}

.result-export {
  text-align: center;
  margin-top: 2rem;
  padding: 2rem 0;
}

/* Top controls */
.top-controls {
  position: fixed;
  top: 1.2rem;
  right: 1.2rem;
  display: flex;
  gap: 0.5rem;
  z-index: 100;
}
.top-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  transition: all 0.3s;
}
.top-btn:hover { border-color: var(--teal); color: var(--text); }
.lang-toggle {
  font-size: 0.7rem;
  font-weight: 800;
  letter-spacing: 1px;
}
.theme-toggle .icon-sun { display: none; }
.theme-toggle .icon-moon { display: block; }
:root.light .theme-toggle .icon-sun { display: block; }
:root.light .theme-toggle .icon-moon { display: none; }

/* Footer */
.foot {
  text-align: center;
  padding: 3rem 0 2rem;
  font-size: 0.72rem;
  color: var(--text-dim);
}
</style>
</head>
<body>
<div class="top-controls">
  <button class="top-btn lang-toggle" onclick="toggleLang()" aria-label="Switch language" id="langBtn">EN</button>
  <button class="top-btn theme-toggle" onclick="toggleTheme()" aria-label="Farbmodus wechseln">

<!-- ====== STEP 3: SCHAM ====== -->
<div class="step" id="step-3" data-step="3">
  <div class="step-tag" data-i18n="s3_tag"></div>

  </div>
</div>

<!-- ====== STEP 4: SUCHT ====== -->
<div class="step" id="step-4" data-step="4">

<script>
// ==================== i18n ====================
const _saved = localStorage.getItem('probatorik-lang');
let lang = _saved || ((navigator.language || 'de').toLowerCase().startsWith('de') ? 'de' : 'en');

const i18n = {
de: {
  header_sub: '\u00d6ffnet es die T\u00fcr \u2014 oder schlie\u00dft es sie?\nFinde deine pers\u00f6nliche Konfiguration.',
  // Step 1
  s1_tag: '01 \u00b7 Dein System',
  s1_q: 'Wie f\u00fchlt sich dein Nervensystem meistens an?',
  s1_desc: 'Nicht heute \u2014 sondern im Normalzustand. Dein Default.',
  s1_o1: '\u00dcberreizt',
  s1_o1d: 'Zu viel Kopf, unruhig, kalter Schwei\u00df, Gedankenrasen, schwer runterzukommen',

  s1_o3: 'Wechselnd',

function t(key) { return i18n[lang][key] || i18n.de[key] || key; }

function applyLang() {
  document.documentElement.lang = lang;
  document.getElementById('langBtn').textContent = lang === 'de' ? 'EN' : 'DE';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    el.innerHTML = t(el.dataset.i18nHtml);
  });
  // Re-generate result if visible
  if (document.getElementById('result').classList.contains('active')) {
    generateResult();
  }
}

function toggleLang() {
  lang = lang === 'de' ? 'en' : 'de';
  localStorage.setItem('probatorik-lang', lang);
  applyLang();
}

// ==================== App Logic ====================
const TOTAL_STEPS = 6;
let current = 1;
const answers = {};

// Init progress dots
const progEl = document.getElementById('progress');
for (let i = 1; i <= TOTAL_STEPS; i++) {
  const d = document.createElement('div');
  d.className = 'progress-dot' + (i === 1 ? ' active' : '');
  d.dataset.step = i;
  progEl.appendChild(d);
}

// Option click handlers
document.querySelectorAll('.options').forEach(group => {
  const isMulti = group.classList.contains('multi');
  group.querySelectorAll('.option').forEach(opt => {
    opt.addEventListener('click', () => {
      const key = group.dataset.key;
      const val = opt.dataset.value;
      if (isMulti) {
        opt.classList.toggle('selected');
        if (!answers[key]) answers[key] = [];
        if (opt.classList.contains('selected')) {
          if (val === 'keine') {
            group.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');
            answers[key] = ['keine'];
          } else {
            group.querySelector('[data-value="keine"]')?.classList.remove('selected');
            answers[key] = answers[key].filter(v => v !== 'keine');
            if (!answers[key].includes(val)) answers[key].push(val);
          }
        } else {
          answers[key] = answers[key].filter(v => v !== val);
        }
      } else {
        group.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        answers[key] = val;
      }
      const step = opt.closest('.step');
      const btn = step.querySelector('.btn-primary');
      if (btn) btn.disabled = false;
    });
  });
});

function updateSlider(name) {
  const slider = document.getElementById(name + 'Slider');
  const val = document.getElementById(name + 'Val');
  val.textContent = slider.value;
  answers[name] = parseInt(slider.value);
}

function updateProgress() {
  progEl.querySelectorAll('.progress-dot').forEach(d => {
    const s = parseInt(d.dataset.step);
    d.className = 'progress-dot' + (s < current ? ' done' : '') + (s === current ? ' active' : '');
  });
}

function nextStep() {
  document.getElementById('step-' + current).classList.remove('active');
  current++;
  document.getElementById('step-' + current).classList.add('active');
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevStep() {
  document.getElementById('step-' + current).classList.remove('active');
  current--;
  document.getElementById('step-' + current).classList.add('active');
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showResult() {
  answers.kopf = parseInt(document.getElementById('kopfSlider').value);
  answers.koerper = parseInt(document.getElementById('koerperSlider').value);
  answers.emotion = parseInt(document.getElementById('emotionSlider').value);
  answers.scham = parseInt(document.getElementById('schamSlider').value);

  document.getElementById('step-' + current).classList.remove('active');
  progEl.querySelectorAll('.progress-dot').forEach(d => d.className = 'progress-dot done');

  const result = document.getElementById('result');
  result.classList.add('active');
  generateResult();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function generateResult() {
  const ns = answers.nervensystem;
  const ziel = answers.ziel;
  const scham = answers.scham || 5;
  const sucht = answers.sucht;
  const erf = answers.erfahrung || [];
  const kopf = answers.kopf || 5;
  const koerper = answers.koerper || 5;

  let html = '';
  let warnings = [];

  if (sucht === 'substanz' || sucht === 'beides') {
    warnings.push(t('r_warn_sucht'));
  }

  let desc = '';
  if (ns === 'ueberreizt') desc = t('r_desc_ueberreizt');
  else if (ns === 'starre') desc = t('r_desc_starre');
  else if (ns === 'wechselnd') desc = t('r_desc_wechselnd');
  else desc = t('r_desc_reguliert');
  document.getElementById('resultDesc').textContent = desc;

  // === REGULATION ===
  html += '<div class="result-section"><h3>' + t('r_h_regulation') + '</h3>';
  if (ns === 'ueberreizt' || ns === 'wechselnd') {
    html += resultItem(t('ri_indica_low'), t('ri_indica_strains'), 'badge-regulate', t('b_reguliert'));
    html += resultItem(t('ri_sativa'), t('ri_sativa_nicht'), 'badge-avoid', t('b_vermeiden'));
  } else if (ns === 'starre') {
    html += resultItem(t('ri_sativa_mod'), t('ri_sativa_aktiv'), 'badge-regulate', t('b_reguliert'));
    html += resultItem(t('ri_indica'), t('ri_indica_starre'), 'badge-caution', t('b_vorsicht'));
  } else {
    html += resultItem(t('ri_indica'), t('ri_indica_opt'), 'badge-regulate', t('b_optional'));
  }
  html += '</div>';

  // === ÖFFNUNG ===
  html += '<div class="result-section"><h3>' + t('r_h_oeffnung') + '</h3>';
  if (sucht === 'substanz' || sucht === 'beides') {
    html += resultItem(t('ri_entzug'), t('ri_entzug_desc'), 'badge-avoid', t('b_warten'));
    html += resultItem(t('ri_iboga'), t('ri_iboga_sucht'), 'badge-open', t('b_oeffnet'));
    html += resultItem(t('ri_psi_lsd'), t('ri_psi_lsd_desc'), 'badge-open', t('b_oeffnet'));
  } else {
    html += resultItem(t('ri_psi'), erf.includes('psilocybin') ? t('ri_psi_exp') : t('ri_psi_new'), 'badge-open', t('b_oeffnet'));
    html += resultItem(t('ri_lsd'), erf.includes('lsd') ? t('ri_lsd_exp') : t('ri_lsd_new'), 'badge-open', t('b_oeffnet'));
  }
  if (scham >= 7) {
    html += resultItem(t('ri_mdma'), erf.includes('mdma') ? t('ri_mdma_exp') : t('ri_mdma_scham'), 'badge-open', t('b_oeffnet'));
  } else if (scham >= 4) {
    html += resultItem(t('ri_mdma'), erf.includes('mdma') ? t('ri_mdma_exp') : t('ri_mdma_opt'), 'badge-open', t('b_optional'));
  }
  html += '</div>';

  // === NOTAUS ===
  html += '<div class="result-section"><h3>' + t('r_h_notaus') + '</h3>';
  html += resultItem(t('ri_keta'), erf.includes('ketamin') ? t('ri_keta_exp') : t('ri_keta_desc'), 'badge-caution', t('b_gezielt'));
  html += resultItem(t('ri_keta_regel'), t('ri_keta_warn'), 'badge-avoid', t('b_regel'));
  html += '</div>';

  // === RESET ===
  if (sucht !== 'keine' || scham >= 8) {
    html += '<div class="result-section"><h3>' + t('r_h_reset') + '</h3>';
    html += resultItem(t('ri_iboga'), t('ri_iboga_reset'), 'badge-open', t('b_reset'));
    html += '</div>';
  }

  // === REGLER ===
  html += '<div class="result-section"><h3>' + t('r_h_regler') + '</h3>';
  html += resultItem(t('ri_sorte'), ns === 'ueberreizt' ? t('ri_indica_sativa') : ns === 'starre' ? t('ri_sativa_indica') : t('ri_situativ'), '', '');
  html += resultItem(t('ri_dosis'), kopf >= 7 ? t('ri_dosis_low') : t('ri_dosis_mod'), '', '');
  html += resultItem(t('ri_einnahme'), t('ri_einnahme_desc'), '', '');
  html += resultItem(t('ri_baseline'), koerper >= 7 ? t('ri_base_unruhig') : koerper <= 3 ? t('ri_base_schwer') : t('ri_base_ok'), '', '');
  html += '</div>';

  // === NIEMALS ===
  const closingExp = ['alkohol','nikotin','kokain','amphetamin','opioide','benzos'].filter(s => erf.includes(s));
  html += '<div class="result-section"><h3>' + t('r_h_schliesst') + '</h3>';
  if (closingExp.length > 0) {
    html += '<div style="color:var(--parasitaer);font-size:0.85rem;margin-bottom:0.8rem;font-style:italic">' + t('ri_closing_known') + '</div>';
  }
  html += resultItem(t('ri_alkohol'), t('ri_alkohol_d'), 'badge-avoid', t('b_schliesst'));
  html += resultItem(t('ri_zigaretten'), t('ri_zigaretten_d'), 'badge-avoid', t('b_schliesst'));
  html += resultItem(t('ri_opioide'), t('ri_opioide_d'), 'badge-avoid', t('b_schliesst'));
  html += resultItem(t('ri_benzos'), t('ri_benzos_d'), 'badge-avoid', t('b_schliesst'));
  html += resultItem(t('ri_kokain'), t('ri_kokain_d'), 'badge-avoid', t('b_schliesst'));
  html += resultItem(t('ri_amphet'), t('ri_amphet_d'), 'badge-avoid', t('b_schliesst'));
  html += '</div>';

  if (warnings.length) {
    html += '<div class="result-warning">' + warnings.join('<br><br>') + '</div>';
  }

  document.getElementById('resultContent').innerHTML = html;
}

function resultItem(name, config, badgeClass, badgeText) {
  return `<div class="result-item">
    <span class="result-name">${name}</span>
    <span class="result-config">${config}${badgeText ? ` <span class="result-badge ${badgeClass}">${badgeText}</span>` : ''}</span>
  </div>`;
}

function sendResult() {
  const el = document.getElementById('resultContent');
  let text = t('r_export_head') + '\n';
  text += document.getElementById('resultDesc').textContent + '\n\n';
  el.querySelectorAll('.result-section').forEach(s => {
    text += '== ' + s.querySelector('h3').textContent + ' ==\n';
    s.querySelectorAll('.result-item').forEach(item => {
      text += '- ' + item.querySelector('.result-name').textContent + ': ' + item.querySelector('.result-config').textContent + '\n';
    });
    text += '\n';
  });
  const subject = encodeURIComponent(t('r_export_head'));
  const body = encodeURIComponent(text);
  window.location.href = 'mailto:jochen.hornung@me.com?subject=' + subject + '&body=' + body;
}

// Theme toggle
function toggleTheme() {
  document.documentElement.classList.toggle('light');
  localStorage.setItem('probatorik-theme',
    document.documentElement.classList.contains('light') ? 'light' : 'dark');
}
// Auto-detect theme: saved preference > system/time
const savedTheme = localStorage.getItem('probatorik-theme');
if (savedTheme === 'light') {
  document.documentElement.classList.add('light');
} else if (!savedTheme) {
  const hour = new Date().getHours();
  if (hour >= 7 && hour < 19) document.documentElement.classList.add('light');
}

// Init
document.getElementById('step-1').classList.add('active');
applyLang();
</script>
